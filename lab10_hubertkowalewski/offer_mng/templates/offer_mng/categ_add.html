{% extends 'offer/base.html' %} {% block title %}Dodaj kategorię{% endblock %}

{% block content %}
    <h1>Dodaj nową kategorię do oferty</h1>
    
    {% if success %}
        <h3 style="color: green;">Kategoria została zapisana pomyślnie!</h3>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Zapisz kategorię</button>
    </form>
{% endblock %}
